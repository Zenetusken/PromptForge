name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    name: claude-review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          direct_prompt: |
            You are reviewing a pull request for **Project Synthesis** — a FastAPI + SvelteKit prompt-optimization platform with an industrial cyberpunk UI.

            The PR diff is available via `git diff origin/${{ github.base_ref }}...HEAD`.

            ## Architecture rules (hard violations = block merge)

            **Backend layer contract:**
            - Flow is `routers/ → services/ → models/` only. Services must NEVER import from routers.
            - Provider is detected ONCE at startup. Never call `detect_provider()` inside a request handler or MCP tool.
            - Model IDs must come from `config.py` (`settings.MODEL_SONNET`, etc.) — never hardcoded.
            - All list endpoints must return the pagination envelope `{total, count, offset, items, has_more, next_offset}`.
            - Sort columns must be guarded by `_VALID_SORT_COLUMNS` whitelist.
            - GitHub tokens are Fernet-encrypted at rest. Only `github_service.encrypt_token` / `decrypt_token` are entry points.
            - API key management uses `data/.api_credentials` (Fernet-encrypted). Only `providers.py` router handles this.
            - Embedding calls (`embed_single`, `embed_texts`) must use the async wrappers (`aembed_single`, `aembed_texts`) from async code.

            **MCP tools:**
            - All tools use the `synthesis_` prefix.
            - MCP tools use `async with async_session_factory() as session` — never FastAPI `Depends(get_session)`.
            - Provider comes from the MCP lifespan context, not `detect_provider()`.

            **Frontend (Svelte 5 + TailwindCSS 4):**
            - Zero glow, shadow, blur effects anywhere. 1px borders only. No rounded corners (except `rounded-sm` on tiny badges).
            - Use Svelte 5 runes: `$state`, `$effect`, `$derived.by()`, `$props`. No legacy stores.
            - Use `$derived.by(() => { ... })` for computed values with function bodies, not `$derived(() => { ... })`.
            - All API calls go through `$lib/api/client.ts` — no bare `fetch()` in components.
            - SSE streams must abort the previous controller before starting a new one.
            - Store `reset()` methods must abort any active controller.

            **General:**
            - No hardcoded secrets, URLs, or magic strings outside `config.py` / `.env`.
            - All async functions need structured error handling, not bare `print()`.
            - New backend endpoints need at least one corresponding test.

            ## What to report

            Post **inline comments** on specific lines. For each finding include:
            1. Which rule it breaks
            2. The exact fix required

            End with a **summary comment** covering: (a) hard blockers, (b) security observations, (c) test coverage gaps, (d) overall assessment.

            Be direct and precise. Skip praise.
